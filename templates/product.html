<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - {{ name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=20251107_5" >
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a6b10;
            --primary-light: #6b4f00;
            --bg-dark: #f3efe4;
            --card-bg: rgba(255, 255, 255, 0.97);
            --text-light: #1f2937;
            --text-muted: #374151;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 80px 0 0 0;
            background-image: none;
        }

        .container {
            max-width: 1200px;
            background: transparent;
            box-shadow: none;
        }

        .product-page-container {
            max-width: 1000px;
            margin: 60px auto;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 50px;
            box-shadow: 0 20px 45px -18px rgba(31, 41, 55, 0.25);
            border: 1px solid rgba(31, 41, 55, 0.15);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-image-section {
            position: relative;
        }

        .product-image-wrapper {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: transform 0.5s ease;
        }

        .product-image-wrapper:hover {
            transform: scale(1.02);
        }

        .product-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .product-info-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .product-title {
            font-size: 2.8rem;
            line-height: 1.1;
            font-weight: 800;
            margin: 0 0 15px 0;
            color: #111827;
        }

        .price-tag {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-light);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        .price-tag::before {
            content: '';
            display: inline-block;
            width: 30px;
            height: 2px;
            background: var(--primary);
            margin-right: 15px;
        }

        .description-box {
            background: #f9fafb;
            border-left: 3px solid var(--primary);
            padding: 20px;
            border-radius: 0 15px 15px 0;
            margin-bottom: 30px;
        }

        .description-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-muted);
            font-style: italic;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }

        .meta-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .meta-icon {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .meta-label {
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 4px;
            display: block;
        }

        .meta-content {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .action-area {
            display: flex;
            gap: 20px;
        }

        .btn-primary {
            flex: 2;
            background: linear-gradient(135deg, var(--primary), #b8860b);
            color: #000;
            padding: 18px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.5);
        }

        .btn-secondary {
            flex: 1;
            background: transparent;
            border: 2px solid rgba(31, 41, 55, 0.25);
            color: #1f2937;
            padding: 18px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(31, 41, 55, 0.08);
            border-color: rgba(31, 41, 55, 0.4);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 30px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .back-link span {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .cart-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .cart-modal-overlay.show {
            display: flex;
        }

        .cart-modal {
            width: min(560px, 100%);
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(17, 24, 39, 0.12);
            animation: fadeIn 0.25s ease-out;
        }

        .cart-modal-title {
            margin: 0 0 18px 0;
            color: #111827;
            font-size: 1.4rem;
            font-weight: 800;
        }

        .cart-modal-product {
            display: grid;
            grid-template-columns: 95px 1fr;
            gap: 14px;
            align-items: center;
            padding: 14px;
            border-radius: 12px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }

        .cart-modal-product img {
            width: 95px;
            height: 110px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-product-name {
            margin: 0 0 6px 0;
            color: #111827;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .cart-product-price {
            margin: 0;
            color: #6b4f00;
            font-weight: 700;
        }

        .cart-summary {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            border-top: 1px solid #e5e7eb;
            color: #1f2937;
            font-weight: 600;
        }

        .cart-modal-actions {
            margin-top: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .cart-btn {
            display: inline-block;
            border: none;
            text-align: center;
            border-radius: 999px;
            padding: 12px 18px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            font-family: inherit;
        }

        .cart-btn-primary {
            background: linear-gradient(135deg, var(--primary), #b8860b);
            color: #111;
        }

        .cart-btn-secondary {
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        @media (max-width: 900px) {
            .product-page-container {
                grid-template-columns: 1fr;
                padding: 30px;
                margin: 20px;
                gap: 30px;
            }
            .product-title {
                font-size: 2.2rem;
            }

            .cart-modal-actions {
                grid-template-columns: 1fr;
            }

            .cart-modal-product {
                grid-template-columns: 80px 1fr;
            }

            .cart-modal-product img {
                width: 80px;
                height: 95px;
            }
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container" style="padding-top: 20px;">

        <div class="product-page-container">
            <div class="product-image-section">
                <a href="javascript:history.back()" class="back-link">
                    <span>&larr;</span> Back to Recommendations
                </a>
                <div class="product-image-wrapper">
                    <img src="{{ img_url }}" alt="{{ name }}">
                </div>
            </div>

            <div class="product-info-section">
                <div class="breadcrumb">Premium Collection</div>
                <h2 class="product-title">{{ name }}</h2>
                <div class="price-tag">{{ price }}</div>

                <div class="description-box">
                    <div class="description-text">
                        {{ description }}
                    </div>
                </div>

                <div class="meta-grid">
                    <div class="meta-item">
                        <div class="meta-icon">💡</div>
                        <div>
                            <span class="meta-label">Stylist Tip</span>
                            <span class="meta-content">{{ tip }}</span>
                        </div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-icon">🌿</div>
                        <div>
                            <span class="meta-label">Sustainable Ethos</span>
                            <span class="meta-content">Crafted with {{ material }}</span>
                        </div>
                    </div>
                </div>

                <div class="action-area">
                    <a href="#" class="btn-primary" onclick="addToCartGlobal({{ name|tojson }}, {{ price|tojson }}, {{ img_url|tojson }}, window.location.href)">Add to Bag</a>
                    <a href="#" class="btn-secondary">Wishlist</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
